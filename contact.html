<form id="contact-form" class="contact-form" action="https://formspree.io/f/xbdzdedk" method="POST">
    
    <!-- Formspree Configuration -->
    <input type="hidden" name="_subject" value="New Contact - Zenova Website">
    
    <div class="form-row">
        <div class="form-group">
            <label for="name">Your Name *</label>
            <input 
                type="text" 
                id="name" 
                name="Name" 
                placeholder="John Smith"
                required
            >
        </div>
        
        <div class="form-group">
            <label for="email">Email Address *</label>
            <input 
                type="email" 
                id="email" 
                name="Email" 
                placeholder="john@example.com"
                required
            >
            <input type="hidden" name="_replyto" id="email-replyto">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input 
                type="tel" 
                id="phone" 
                name="Phone" 
                placeholder="+1 (555) 123-4567"
            >
        </div>
        
        <div class="form-group">
            <label for="service">Interested In *</label>
            <select id="service" name="Service Interested In" required>
                <option value="">Select a service</option>
                <option value="Social Media Marketing">Social Media Marketing</option>
                <option value="SEO Services">SEO Services</option>
                <option value="PPC Advertising">PPC Advertising</option>
                <option value="Content Marketing">Content Marketing</option>
                <option value="Web Development">Web Development</option>
                <option value="Branding">Branding</option>
                <option value="AI Receptionist">AI Receptionist</option>
                <option value="Mobile App Development">Mobile App Development</option>
                <option value="CRM Software">CRM Software</option>
                <option value="Not Sure / Multiple Services">Not Sure / Multiple Services</option>
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label for="company">Company Name</label>
        <input 
            type="text" 
            id="company" 
            name="Company" 
            placeholder="Your Company Ltd."
        >
    </div>
    
    <div class="form-group">
        <label for="message">Tell Us About Your Project *</label>
        <textarea 
            id="message" 
            name="Message" 
            rows="6" 
            placeholder="What are your goals? What challenges are you facing? The more details, the better we can help!"
            required
        ></textarea>
    </div>
    
    <div class="form-group">
        <label for="budget">Monthly Marketing Budget</label>
        <select id="budget" name="Budget">
            <option value="">Select your budget range</option>
            <option value="Under $1,000/month">Under $1,000/month</option>
            <option value="$1,000 - $3,000/month">$1,000 - $3,000/month</option>
            <option value="$3,000 - $5,000/month">$3,000 - $5,000/month</option>
            <option value="$5,000 - $10,000/month">$5,000 - $10,000/month</option>
            <option value="$10,000+/month">$10,000+/month</option>
            <option value="Not sure yet">Not sure yet</option>
        </select>
    </div>
    
    <button type="submit" class="btn btn-primary btn-large">
        Send Message
        <i class="fas fa-paper-plane"></i>
    </button>
    
    <p class="form-note">
        * Required fields. We respect your privacy and will never share your information.
    </p>
</form>
