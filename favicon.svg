<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F8FB3"/>
      <stop offset="100%" style="stop-color:#2EC7FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="18" fill="#0B0F14"/>
  <text x="50" y="58" dominant-baseline="middle" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="72" font-weight="800"
        fill="url(#g)" filter="url(#glow)">Z</text>
</svg>
